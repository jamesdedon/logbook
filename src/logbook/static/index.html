<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logbook</title>
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1><a href="https://github.com/jamesdedon/logbook" target="_blank" rel="noopener noreferrer">Logbook</a></h1>
    <nav>
      <button class="tab active" data-tab="summary">Summary</button>
      <button class="tab" data-tab="today">Today</button>
      <button class="tab" data-tab="weekly">Weekly</button>
      <button class="tab" data-tab="help">Help</button>
      <button class="tab" data-tab="api">API</button>
    </nav>
    <div class="header-right">
      <input id="search-input" type="text" placeholder="Search..." />
      <button id="theme-toggle" title="Toggle theme">&#9790;</button>
    </div>
  </header>
  <main id="content">
    <p class="loading">Loading...</p>
  </main>
  <div class="bg-picker">
    <input id="bg-file" type="file" accept="image/jpeg,image/png" hidden />
    <button id="bg-clear" title="Clear background" hidden>&times;</button>
    <button id="bg-choose" title="Choose background image">&#127748;</button>
  </div>
  <script src="marked.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
